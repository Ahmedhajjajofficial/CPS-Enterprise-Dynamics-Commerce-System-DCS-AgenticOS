name: DCS-AgenticOS-CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            cps-enterprise-dcs/pos-interface/package-lock.json

      - name: Lint & Build Admin App
        run: |
          cd app
          npm ci --progress=false
          npm run lint
          npm run build

      - name: Lint & Build POS Interface
        run: |
          cd cps-enterprise-dcs/pos-interface
          npm ci --legacy-peer-deps --progress=false
          npm run lint
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: true
          cache-dependency-path: cps-enterprise-dcs/regional-agent/go.sum

      - name: Lint & Build Regional Agent
        run: |
          cd cps-enterprise-dcs/regional-agent
          go vet ./...
          mkdir -p bin
          go build -o bin/ ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Test Local Agent
        run: |
          pip install -r cps-enterprise-dcs/local-agent/requirements.txt
          python -m pytest cps-enterprise-dcs/local-agent/src/ -v || [ $? -eq 5 ]

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/dist/
            cps-enterprise-dcs/pos-interface/dist/
            cps-enterprise-dcs/regional-agent/bin/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --assets=./app/dist

      - name: Build & Deploy Docs
        run: |
          pip install mkdocs==1.6.1 mkdocs-material==9.5.47 mkdocs-static-i18n==1.2.3
          mkdocs build --clean --site-dir public

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
