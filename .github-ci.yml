# ═══════════════════════════════════════════════════════════════════════════════
# CP'S Enterprise Dynamics Commerce System (DCS) — CI/CD Pipeline
# Polyglot monorepo: React/TS (Admin + POS), Python (Local Agent), Go (Regional Agent)
# ═══════════════════════════════════════════════════════════════════════════════

stages:
  - lint
  - build
  - test
  - deploy

# ─── Global Variables ─────────────────────────────────────────────────────────

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GOPATH: "$CI_PROJECT_DIR/.cache/go"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  NODE_VERSION: "22"

# ─── Reusable Rule Definitions ────────────────────────────────────────────────

.rules-mr-and-main:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules-deploy:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ═══════════════════════════════════════════════════════════════════════════════
#  LINT STAGE — Fast feedback on code quality
# ═══════════════════════════════════════════════════════════════════════════════

# Lint the Admin App (React 19 / TypeScript / ESLint)
lint-app:
  stage: lint
  image: node:22-slim
  needs: []
  cache:
    key: app-node-modules
    paths:
      - app/node_modules/
  script:
    - cd app
    - npm clean-install --progress=false
    - npm run lint
  rules:
    - !reference [.rules-mr-and-main, rules]

# Lint the POS Interface (React 18 / TypeScript / ESLint)
# --legacy-peer-deps: vite@8 conflicts with @vitejs/plugin-react peer dep (supports up to vite@7)
lint-pos:
  stage: lint
  image: node:22-slim
  needs: []
  cache:
    key: pos-node-modules
    paths:
      - cps-enterprise-dcs/pos-interface/node_modules/
  script:
    - cd cps-enterprise-dcs/pos-interface
    - npm clean-install --legacy-peer-deps --progress=false
    - npm run lint
  rules:
    - !reference [.rules-mr-and-main, rules]

# Lint the Regional Agent (Go / go vet)
lint-regional-agent:
  stage: lint
  image: golang:1.24-alpine
  needs: []
  cache:
    key: go-mod-cache
    paths:
      - .cache/go/pkg/mod/
  script:
    - cd cps-enterprise-dcs/regional-agent
    - go vet ./...
  rules:
    - !reference [.rules-mr-and-main, rules]

# ═══════════════════════════════════════════════════════════════════════════════
#  BUILD STAGE — Compile and bundle all components
# ═══════════════════════════════════════════════════════════════════════════════

# Build the Admin App (React 19 / Vite 7)
build-app:
  stage: build
  image: node:22-slim
  needs: []
  cache:
    key: app-node-modules
    paths:
      - app/node_modules/
  script:
    - cd app
    - npm clean-install --progress=false
    - npm run build
  artifacts:
    paths:
      - app/dist/
    expire_in: 1 hour
  rules:
    - !reference [.rules-mr-and-main, rules]

# Build the POS Interface (React 18 / Vite)
# --legacy-peer-deps: vite@8 conflicts with @vitejs/plugin-react peer dep (supports up to vite@7)
build-pos:
  stage: build
  image: node:22-slim
  needs: []
  cache:
    key: pos-node-modules
    paths:
      - cps-enterprise-dcs/pos-interface/node_modules/
  script:
    - cd cps-enterprise-dcs/pos-interface
    - npm clean-install --legacy-peer-deps --progress=false
    - npm run build
  artifacts:
    paths:
      - cps-enterprise-dcs/pos-interface/dist/
    expire_in: 1 hour
  rules:
    - !reference [.rules-mr-and-main, rules]

# Build the Regional Agent (Go binary)
# mkdir -p bin: required because `go build ./...` with multiple packages needs a directory target
build-regional-agent:
  stage: build
  image: golang:1.24-alpine
  needs: []
  cache:
    key: go-mod-cache
    paths:
      - .cache/go/pkg/mod/
  script:
    - cd cps-enterprise-dcs/regional-agent
    - mkdir -p bin
    - go build -o bin/ ./...
  artifacts:
    paths:
      - cps-enterprise-dcs/regional-agent/bin/
    expire_in: 1 hour
  rules:
    - !reference [.rules-mr-and-main, rules]

# ═══════════════════════════════════════════════════════════════════════════════
#  TEST STAGE — Run unit and integration tests
# ═══════════════════════════════════════════════════════════════════════════════

# Test the Local Agent (Python / pytest)
# allow_failure: true — no test files exist yet; remove once tests are added
# Exit code 5 means "no tests collected" — treated as success until tests are added
test-local-agent:
  stage: test
  image: python:3.11-slim
  needs: []
  cache:
    key: pip-cache
    paths:
      - .cache/pip/
  script:
    - pip install --quiet -r cps-enterprise-dcs/local-agent/requirements.txt
    - python -m pytest cps-enterprise-dcs/local-agent/src/ -v --tb=short || [ $? -eq 5 ]
  allow_failure: "true"
  rules:
    - !reference [.rules-mr-and-main, rules]

# Test the Regional Agent (Go / go test)
# allow_failure: true — no test files exist yet; remove once tests are added
test-regional-agent:
  stage: test
  image: golang:1.24-alpine
  needs: []
  cache:
    key: go-mod-cache
    paths:
      - .cache/go/pkg/mod/
  script:
    - cd cps-enterprise-dcs/regional-agent
    - go test ./... -v
  allow_failure: "true"
  rules:
    - !reference [.rules-mr-and-main, rules]

# ═══════════════════════════════════════════════════════════════════════════════
#  DEPLOY STAGE — Ship to production (main branch only)
# ═══════════════════════════════════════════════════════════════════════════════

# Deploy the Admin App to Cloudflare Workers
deploy-cloudflare:
  stage: deploy
  image: node:22-slim
  needs:
    - build-app
  script:
    - npx wrangler@latest versions upload --assets=./app/dist
  environment:
    name: production
    url: https://$CLOUDFLARE_WORKERS_SUBDOMAIN.workers.dev
  rules:
    - !reference [.rules-deploy, rules]

# Build and deploy MkDocs documentation to github Pages (bilingual Ar-En)
pages:
  stage: deploy
  image: python:3.11-slim
  needs: []
  cache:
    key: pip-cache
    paths:
      - .cache/pip/
  script:
    - pip install --quiet mkdocs==1.6.1 mkdocs-material==9.5.47 mkdocs-minify-plugin==0.8.0 pymdown-extensions==10.11 pygments==2.18.0 mkdocs-static-i18n==1.2.3
    - mkdocs build --clean --site-dir public
  artifacts:
    paths:
      - public
  rules:
    # Auto-deploy when docs or config change
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
        - mkdocs.yml
        - .github-ci.yml
    # Manual trigger for other main branch pushes
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
