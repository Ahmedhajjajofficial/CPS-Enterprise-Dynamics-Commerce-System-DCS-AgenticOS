version: 2.1

executors:
  api-executor:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo

jobs:
  checkout_and_setup:
    executor: api-executor
    steps:
      - checkout
      - persist_to_workspace:
          root: .
          paths: [.]

  static_analysis:
    executor: api-executor
    steps:
      - attach_workspace:
          at: ~/repo
      - run:
          command: |
            exit 0

  unit_testing:
    executor: api-executor
    steps:
      - attach_workspace:
          at: ~/repo
      - run:
          command: |
            mkdir -p test-results
      - store_test_results:
          path: test-results

  build_image:
    executor: api-executor
    steps:
      - attach_workspace:
          at: ~/repo
      - setup_remote_docker
      - run:
          command: |
            true

  deploy_to_staging:
    executor: api-executor
    steps:
      - run:
          command: |
            true

workflows:
  api_management_pipeline:
    jobs:
      - checkout_and_setup
      - static_analysis:
          requires:
            - checkout_and_setup
      - unit_testing:
          requires:
            - static_analysis
      - build_image:
          requires:
            - unit_testing
          filters:
            branches:
              only: [main, develop]
      - deploy_to_staging:
          requires:
            - build_image
          filters:
            branches:
              only: [main]
