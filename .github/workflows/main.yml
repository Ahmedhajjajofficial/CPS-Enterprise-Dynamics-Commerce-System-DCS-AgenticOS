name: DCS AgenticOS CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  GO_VERSION: "1.24"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # LINT STAGE
  # ═══════════════════════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            cps-enterprise-dcs/pos-interface/package-lock.json

      - name: Lint Admin App
        run: |
          cd app
          npm clean-install --progress=false
          npm run lint

      - name: Lint POS Interface
        run: |
          cd cps-enterprise-dcs/pos-interface
          npm clean-install --legacy-peer-deps --progress=false
          npm run lint

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: cps-enterprise-dcs/regional-agent/go.sum

      - name: Lint Regional Agent
        run: |
          cd cps-enterprise-dcs/regional-agent
          go vet ./...

  # ═══════════════════════════════════════════════════════════════════════════════
  # BUILD & TEST STAGE
  # ═══════════════════════════════════════════════════════════════════════════════
  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Admin App
        run: |
          cd app
          npm clean-install
          npm run build

      - name: Build POS Interface
        run: |
          cd cps-enterprise-dcs/pos-interface
          npm clean-install --legacy-peer-deps
          npm run build

      - name: Setup Python for Local Agent
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Test Local Agent
        run: |
          pip install -r cps-enterprise-dcs/local-agent/requirements.txt
          python -m pytest cps-enterprise-dcs/local-agent/src/ -v || [ $? -eq 5 ]

      - name: Build Regional Agent (Go)
        run: |
          cd cps-enterprise-dcs/regional-agent
          mkdir -p bin
          go build -o bin/ ./...

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/dist/
            cps-enterprise-dcs/pos-interface/dist/
            cps-enterprise-dcs/regional-agent/bin/

  # ═══════════════════════════════════════════════════════════════════════════════
  # DEPLOY STAGE
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-outputs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --assets=./app/dist

      - name: Setup Python for Docs
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build and Deploy MkDocs
        run: |
          pip install mkdocs==1.6.1 mkdocs-material==9.5.47 mkdocs-static-i18n==1.2.3
          mkdocs build --clean
        # GitHub Pages deployment usually requires a separate action or pushing to 'gh-pages' branch
