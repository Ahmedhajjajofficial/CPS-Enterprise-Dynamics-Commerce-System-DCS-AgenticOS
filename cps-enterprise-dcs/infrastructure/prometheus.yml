global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'regional-agent'
    static_configs:
      - targets: ['regional-agent:50052']
  - job_name: 'local-agent'
    static_configs:
      - targets: ['local-agent:50051']
